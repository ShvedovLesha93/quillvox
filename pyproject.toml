[project]
name = "audio_transcription"
version = "0.1.0"
description = "An desktop application for audio transcription"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "faster-whisper>=1.2.1",
    "librosa>=0.11.0",
    "polib>=1.2.0",
    "pyqtgraph>=0.14.0",
    "pyside6>=6.10.1",
    "rich>=14.2.0",
    "torch>=2.9.1",
]

[dependency-groups]
dev = [
    "watchdog>=6.0.0",
]
