[project]
name = "audio_transcription"
version = "0.1.0"
description = "An desktop application for audio transcription"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "faster-whisper>=1.2.1",
    "polib>=1.2.0",
    "pyqtgraph>=0.14.0",
    "pyside6>=6.10.1",
    "rich>=14.2.0",
    # torch installed manually via: uv pip install torch --index-url https://download.pytorch.org/whl/cu126
]

[dependency-groups]
dev = [
    "pyinstaller>=6.18.0",
    "watchdog>=6.0.0",
]
